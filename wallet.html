<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1b2838;
            color: white;
            font-family: Arial, sans-serif;
        }
        .header {
            background-color: #171a21;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #66c0f4;
        }
        .search-bar {
            flex-grow: 1;
            margin: 0 10px;
        }
        .search-bar input {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            background-color: #3d4c5a;
            color: white;
        }
        .search-bar input::placeholder {
            color: #c7d5e0;
        }
        .profile-icon {
            width: 40px;
            height: 40px;
            background-color: #66c0f4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1b2838;
        }
        .content {
            padding: 20px;
        }
        .section-title {
            color: #66c0f4;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .wallet-item {
            background-color: #3d4c5a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
        .game-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .game-price {
            color: #c7d5e0;
            font-size: 14px;
        }
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
        }
        .back-button a {
            background-color: #66c0f4;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .back-button a:hover {
            background-color: #5aa9da;
        }
        .btn-primary {
            background-color: #66c0f4;
            border-color: #66c0f4;
        }
        .btn-primary:hover {
            background-color: #5aa9da;
            border-color: #5aa9da;
        }
        body {
            padding-bottom: 100px;
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #171a21;
            border-top: 1px solid #2a475e;
            padding: 12px 0;
            z-index: 1001;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 15px;
            cursor: pointer;
            flex: 1;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }
        .footer-item:hover {
            color: #66c0f4;
            background-color: rgba(102, 192, 244, 0.1);
        }
        .footer-item.active {
            color: #66c0f4;
            border-top: 3px solid #66c0f4;
        }
        .footer-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .footer-label {
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><img src="https://img.icons8.com/ios-filled/40/66c0f4/shopping-cart.png" alt="Shopping Cart"></div>
        <div class="search-bar">
            <input type="text" placeholder="Search games, friends, etc.">
        </div>
        <div class="profile-icon">U</div>
    </div>

    <div class="content">
        <div class="back-button">
            <a href="index.html">← Back</a>
        </div>
        <h2 class="section-title">Your Wallet</h2>
        <div class="wallet-item">
            <div style="font-size: 18px; font-weight: bold; color: #66c0f4;">Balance: $125.50</div>
            <button class="btn btn-primary mt-3">Add Funds</button>
        </div>
        <h3 class="section-title" style="margin-top: 30px;">Transaction History</h3>
        <div class="wallet-item">
            <div class="game-title">Purchase: The Witcher 3</div>
            <div class="game-price">-$19.99</div>
            <p style="font-size: 12px; color: #c7d5e0; margin-top: 5px;">March 10, 2026</p>
        </div>
        <div class="wallet-item">
            <div class="game-title">Wallet Top-up</div>
            <div class="game-price" style="color: #66c0f4;">+$50.00</div>
            <p style="font-size: 12px; color: #c7d5e0; margin-top: 5px;">March 5, 2026</p>
        </div>
        <div class="wallet-item">
            <div class="game-title">Purchase: Hades</div>
            <div class="game-price">-$24.99</div>
            <p style="font-size: 12px; color: #c7d5e0; margin-top: 5px;">February 28, 2026</p>
        </div>
    </div>

    <div class="footer">
        <a href="index.html" class="footer-item">
            <div class="footer-icon">🏠</div>
            <div class="footer-label">Menu Utama</div>
        </a>
        <a href="notifikasi.html" class="footer-item">
            <div class="footer-icon">🔔</div>
            <div class="footer-label">Notifikasi</div>
        </a>
        <a href="#" class="footer-item active">
            <div class="footer-icon">☰</div>
            <div class="footer-label">Menu</div>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
