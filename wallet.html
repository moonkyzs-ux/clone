<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <div class="cart-icon">
            <a href="keranjang.html">
                <img src="https://img.icons8.com/ios-filled/40/66c0f4/shopping-cart.png" alt="Shopping Cart">
            </a>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search games, friends, etc.">
        </div>
         <a href="profile.html" class="profile-icon">T</a>
    </div>

    <div class="content">
        <div class="back-button">
            <a href="dashboard.html">← Back</a>
        </div>
        <h2 class="section-title">Your Wallet</h2>
        <div class="wallet-item">
            <div class="balance-amount">Balance: $125.50</div>
            <button class="btn btn-primary mt-3">Add Funds</button>
        </div>
        <h3 class="section-title mt-30">Transaction History</h3>
        <div class="wallet-item">
            <div class="game-title">Purchase: The Witcher 3</div>
            <div class="game-price">-$19.99</div>
            <p class="item-detail">March 10, 2026</p>
        </div>
        <div class="wallet-item">
            <div class="game-title">Wallet Top-up</div>
            <div class="game-price positive">+$50.00</div>
            <p class="item-detail">March 5, 2026</p>
        </div>
        <div class="wallet-item">
            <div class="game-title">Purchase: Hades</div>
            <div class="game-price">-$24.99</div>
            <p class="item-detail">February 28, 2026</p>
        </div>
    </div>

    <div class="footer">
        <a href="dashboard.html" class="footer-item">
            <div class="footer-icon">🏠</div>
            <div class="footer-label">Beranda</div>
        </a>
        <a href="notifikasi.html" class="footer-item">
            <div class="footer-icon">🔔</div>
            <div class="footer-label">Notifikasi</div>
        </a>
        <a href="#" class="footer-item active">
            <div class="footer-icon">☰</div>
            <div class="footer-label">Menu</div>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
