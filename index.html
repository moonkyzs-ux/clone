<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a1428 0%, #1b2838 50%, #0d1b2a 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(23, 26, 33, 0.95);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(102, 192, 244, 0.2), 0 0 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(102, 192, 244, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-logo {
            font-size: 48px;
            font-weight: bold;
            color: #66c0f4;
            text-shadow: 0 0 10px rgba(102, 192, 244, 0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .login-tagline {
            font-size: 14px;
            color: #c7d5e0;
            letter-spacing: 1px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #b0c4de;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: #2a3f4f;
            border: 1px solid #3d4c5a;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            background-color: #3d4c5a;
            border-color: #66c0f4;
            box-shadow: 0 0 8px rgba(102, 192, 244, 0.3);
        }
        
        .form-group input::placeholder {
            color: #8b9dc3;
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }
        
        .checkbox-wrapper {
            display: flex;
            align-items: center;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: #66c0f4;
        }
        
        .checkbox-wrapper label {
            margin: 0;
            cursor: pointer;
            color: #b0c4de;
            font-weight: 400;
            text-transform: none;
        }
        
        .forgot-password {
            color: #66c0f4;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .forgot-password:hover {
            color: #5aa9da;
            text-decoration: underline;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1b7ba1 0%, #2a5a8f 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(27, 123, 161, 0.3);
            margin-bottom: 15px;
        }
        
        .btn-login:hover {
            background: linear-gradient(135deg, #237399 0%, #3a6a9f 100%);
            box-shadow: 0 6px 20px rgba(102, 192, 244, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
            font-size: 13px;
            color: #8b9dc3;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 40%;
            height: 1px;
            background-color: #3d4c5a;
            vertical-align: middle;
        }
        
        .divider::before {
            margin-right: 10px;
        }
        
        .divider::after {
            margin-left: 10px;
        }
        
        .btn-register {
            width: 100%;
            padding: 14px;
            background-color: #2a475e;
            color: #66c0f4;
            border: 1px solid #66c0f4;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-register:hover {
            background-color: #3a5570;
            box-shadow: 0 4px 15px rgba(102, 192, 244, 0.2);
        }
        
        .login-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #8b9dc3;
            line-height: 1.6;
        }
        
        .login-footer a {
            color: #66c0f4;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .login-footer a:hover {
            color: #5aa9da;
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }
            
            .login-logo {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">CLONE</div>
            <div class="login-tagline">Gaming Platform</div>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Account Name</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your username or email"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                >
            </div>
            
            <div class="form-options">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        
        <div class="divider">OR</div>
        
        <button class="btn-register" onclick="window.location.href='dashboard.html';">Continue as Guest</button>
        
        <div class="login-footer">
            <p>Don't have an account?<br>
            <a href="#">Create a free account</a></p>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username && password) {
                alert('Welcome to Clone, ' + username + '!');
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
