<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja - Clone Store</title>
    <style>
        :root {
            --bg: #0b141a;
            --panel: #152532;
            --panel-soft: #1c3040;
            --text: #f4f7fb;
            --muted: #9fb0bf;
            --accent: #66c0f4;
            --accent-strong: #3da5db;
            --danger: #ff6b6b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0b141a 0%, #111f2b 100%);
            color: var(--text);
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .btn-back {
            color: var(--accent);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .cart-shell {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .cart-header h1 {
            margin: 0;
            font-size: 24px;
        }

        .cart-header p {
            margin: 0;
            color: var(--muted);
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cart-item {
            display: flex;
            gap: 14px;
            background: var(--panel-soft);
            padding: 14px;
            border-radius: 12px;
            align-items: center;
        }

        .cart-item img {
            width: 88px;
            height: 88px;
            object-fit: cover;
            border-radius: 10px;
        }

        .item-details {
            flex: 1;
        }

        .item-title {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .item-price {
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .qty-box {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .qty-btn {
            border: none;
            background: var(--accent);
            color: #071118;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .qty-btn.remove {
            background: var(--danger);
            color: white;
        }

        .qty-value {
            min-width: 20px;
            text-align: center;
            font-weight: 700;
        }

        .summary-card h2 {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--muted);
        }

        .summary-row.total {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.12);
            margin-top: 10px;
        }

        .checkout-btn,
        .promo-btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }

        .checkout-btn {
            background: var(--accent);
            color: #071118;
        }

        .promo-box {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }

        .promo-box input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2f4858;
            background: #0f1b24;
            color: white;
        }

        .promo-btn {
            background: var(--accent-strong);
            color: white;
            width: auto;
            padding: 10px 12px;
            margin-top: 0;
        }

        .empty-state {
            background: var(--panel-soft);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: var(--muted);
        }

        @media (max-width: 768px) {
            .cart-shell {
                grid-template-columns: 1fr;
            }

            .cart-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <a href="dashboard.html" class="btn-back">❮ Kembali Belanja</a>

    <div class="cart-shell">
        <section class="panel">
            <div class="cart-header">
                <h1>Keranjang Belanja</h1>
                <p id="item-count">0 produk</p>
            </div>
            <div id="cart-items" class="cart-items"></div>
        </section>

        <aside class="panel summary-card">
            <h2>Ringkasan Belanja</h2>
            <div class="summary-row"><span>Subtotal</span><strong id="subtotal">Rp 0</strong></div>
            <div class="summary-row"><span>Diskon</span><strong id="discount">Rp 0</strong></div>
            <div class="summary-row total"><span>Total</span><strong id="total">Rp 0</strong></div>
            <button id="checkoutBtn" class="checkout-btn">Checkout Sekarang</button>

            <div class="promo-box">
                <input id="promoCode" type="text" placeholder="Kode promo">
                <button id="applyPromo" class="promo-btn">Terapkan</button>
            </div>
            <p style="color: var(--muted); font-size: 13px; margin-top: 10px;">Gratis ongkir untuk pembelian di atas Rp 500.000.</p>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
