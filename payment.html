<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Metode Pembayaran</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b141a 0%, #111f2b 100%);
            color: #f4f7fb;
            font-family: Arial, sans-serif;
            padding: 24px;
            display: grid;
            place-items: center;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: #152532;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        }

        h1 {
            margin-top: 0;
            color: #66c0f4;
        }

        .method {
            display: block;
            width: 100%;
            text-align: left;
            padding: 14px;
            margin-top: 10px;
            border-radius: 12px;
            background: #1c3040;
            color: #f4f7fb;
            border: 1px solid #2f4858;
            cursor: pointer;
            font-weight: 700;
        }

        .method:hover {
            border-color: #66c0f4;
        }

        .btn {
            margin-top: 16px;
            display: inline-block;
            padding: 12px 16px;
            background: #66c0f4;
            color: #071118;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
        }

        .muted {
            color: #9fb0bf;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Pilih Metode Pembayaran</h1>
        <p class="muted">Pilih metode pembayaran sebelum melanjutkan ke checkout.</p>

        <button class="method" onclick="selectPayment('Transfer Bank')">🏦 Transfer Bank</button>
        <button class="method" onclick="selectPayment('E-Wallet')">📱 E-Wallet</button>
        <button class="method" onclick="selectPayment('Kartu Kredit')">💳 Kartu Kredit</button>

        <a class="btn" href="keranjang.html">Kembali ke Keranjang</a>
    </div>

    <script src="script.js"></script>
    <script>
        function selectPayment(method) {
            const pendingOrder = JSON.parse(localStorage.getItem('pendingOrder') || 'null');
            if (!pendingOrder) {
                alert('Tidak ada pesanan yang menunggu. Silakan ulangi checkout.');
                return;
            }
            finalizeCheckout(method);
        }
    </script>
</body>
</html>
